version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: doc-editor-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: doc_editor
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
